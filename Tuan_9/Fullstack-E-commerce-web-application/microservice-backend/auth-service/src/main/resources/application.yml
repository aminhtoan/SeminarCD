spring:
  application:
    name: auth-service
  config:
    import: "optional:file:.env[.properties]"
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/auth_service}
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 9030

app:
  emailVerificationEnabled: ${APP_EMAIL_VERIFICATION_ENABLED:false}

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
