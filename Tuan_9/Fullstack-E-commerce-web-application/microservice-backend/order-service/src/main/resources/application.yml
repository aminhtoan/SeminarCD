spring:
  application:
    name: order-service
  config:
    import: "optional:file:.env[.properties]"
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/order_service}
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 9070

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
