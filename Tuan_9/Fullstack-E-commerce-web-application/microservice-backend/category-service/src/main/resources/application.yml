spring:
  application:
    name: category-service
  config:
    import: "optional:file:.env[.properties]"
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/category_service}
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 9000

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    fetchRegistry: true
    registerWithEureka: true
  instance:
    hostname: localhost
